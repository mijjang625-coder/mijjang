<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>쿠팡 상세페이지 제작 에이전트 v3.3</title>

    <!-- ─────────── 무료 상업용 한글 폰트 5종 (Google Fonts / 공식 CDN) ─────────── -->
    <!-- preconnect로 속도 최적화 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <!-- 1) Pretendard (Variable) — 전방위 모던 고딕, 모든 굵기 지원 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />

    <!-- 2) Noto Sans KR (나눔고딕 대체) — Google Fonts -->
    <!-- 3) Gaegu — 손글씨 부드러운 느낌 -->
    <!-- 4) Nanum Gothic (나눔고딕) — 전통적 깔끔함 -->
    <!-- 5) Gowun Dodum — 세련된 모던 세리프 대체 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Nanum+Gothic:wght@400;700;800&family=Gaegu:wght@400;700&family=Gowun+Dodum&family=Gowun+Batang:wght@400;700&family=Jua&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
